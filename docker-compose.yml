networks:
  panel-net:
    name: ${PANEL_NETWORK:-vpn-bridge-proxy_panel-net}
    driver: bridge

services:
  panel:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: panel-backend
    restart: unless-stopped
    volumes:
      - ./backend:/app/backend
      - ./frontend:/app/frontend
      - ./data:/app/data
      - ./xray-configs:/app/xray-configs
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - SECRET_KEY=${SECRET_KEY:-change-me-generate-a-long-random-value}
      - VPS_IP=${VPS_IP:-127.0.0.1}
      - PORT_START=${PORT_START:-20000}
      - PORT_END=${PORT_END:-30000}
      - XRAY_IMAGE=${XRAY_IMAGE:-teddysun/xray:latest}
      - XRAY_CONFIGS_HOST=${XRAY_CONFIGS_HOST:-/opt/vpn-bridge-proxy/xray-configs}
      - HOWDY_IMAGE=${HOWDY_IMAGE:-howdy-bridge:latest}
      - PANEL_NETWORK=${PANEL_NETWORK:-vpn-bridge-proxy_panel-net}
    networks:
      - panel-net
    expose:
      - "8000"

  nginx:
    image: nginx:alpine
    container_name: panel-nginx
    restart: unless-stopped
    ports:
      - "443:443"
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
    networks:
      - panel-net
    depends_on:
      - panel
